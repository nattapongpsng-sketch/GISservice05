<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>PEA GIS Protection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>
<header>
  <h2>PEA GIS Track & Fault Current Test</h2>
  <div>ArcGIS REST → Leaflet → Track DF/Fuse to CB → Fault Current</div>
</header>

<div class="wrap">

  <div class="card">
    <div class="grid">
      <div>
        <label>Feeder Prefix</label>
        <input id="feederPrefix" value="QSA">
      </div>

      <div>
        <label>Voltage</label>
        <select id="voltage">
          <option value="33">33 kV</option>
          <option value="22">22 kV</option>
        </select>
      </div>

      <div>
  <label>Fault Type</label>
  <select id="faultType">
    <option value="1PH">1 Phase to Ground</option>
    <option value="3PH">3 Phase</option>
  </select>
</div>
<div>
  <label>Downstream Fuse</label>
  <select id="downstreamFuse">
    <option value="6">6K</option>
    <option value="8">8K</option>
    <option value="10">10K</option>
    <option value="12">12K</option>
    <option value="15">15K</option>
    <option value="20">20K</option>
    <option value="25">25K</option>
    <option value="30">30K</option>
    <option value="40">40K</option>
    <option value="50">50K</option>
    <option value="65">65K</option>
    <option value="80">80K</option>
    <option value="100">100K</option>
    <option value="140">140K</option>
    <option value="200">200K</option>
  </select>
</div>

<div>
  <label>Upstream Fuse</label>
  <select id="upstreamFuse">
    <option value="10">10K</option>
    <option value="12">12K</option>
    <option value="15">15K</option>
    <option value="20">20K</option>
    <option value="25">25K</option>
    <option value="30">30K</option>
    <option value="40">40K</option>
    <option value="50">50K</option>
    <option value="65">65K</option>
    <option value="80">80K</option>
    <option value="100">100K</option>
    <option value="140">140K</option>
    <option value="200">200K</option>
  </select>
</div>
    </div>

    <br>

    <div class="grid">
      <button onclick="loadAll()">1) โหลดข้อมูล</button>
      <button onclick="trackSelectedDevice()">2) Track + คำนวณ Fault</button>
      <button class="secondary" onclick="clearTrack()">ล้าง Track</button>
      <button class="danger" onclick="resetAll()">Reset ทั้งหมด</button>
    </div>

    <p class="small">
      วิธีใช้: กดโหลดข้อมูล → คลิก DF/Fuse/Switch บนแผนที่ → กด Track + คำนวณ Fault
    </p>
  </div>

  <div class="card">
    <div id="status" class="status">พร้อมใช้งาน</div>
  </div>

  <div class="card">
    <div id="map"></div>
  </div>

  <div class="card">
    <b>ผลลัพธ์</b>
    <pre id="resultBox">-</pre>
  </div>

</div>

<div class="loading" id="loading">
  <div class="box">
    <div class="spin"></div>
    <div style="margin-top:12px;font-weight:bold">กำลังประมวลผล...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/config.js"></script>
<script src="js/map.js"></script>
<script src="js/layers.js"></script>
<script src="js/graph.js"></script>
<script src="js/fault.js"></script>
<script src="js/api.js"></script>
<script src="js/tracking.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
